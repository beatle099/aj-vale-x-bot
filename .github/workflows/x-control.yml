name: A.J. Vale X Control

on:
  workflow_dispatch:
    inputs:
      trigger:
        description: "Content trigger"
        required: true
        default: "persona_post"
        type: choice
        options:
          - persona_post
          - mood_post
          - book_echo
          - reader_question
          - writing_update
          - launch_whisper
          - review_reflection
          - cultural_observation
          - manual_note
      title:
        description: "Optional catalog title or alias"
        required: false
        type: string
      note:
        description: "Optional rough thought, observation, or manual note"
        required: false
        type: string
      review_excerpt:
        description: "Optional reader review excerpt"
        required: false
        type: string
      persist_history:
        description: "Save recommended draft to post_history.json in the workflow artifact"
        required: true
        default: false
        type: boolean
      post_to_x:
        description: "Actually post to X. Requires repository secrets and bypasses dry-run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ inputs.post_to_x == true && 'false' || 'true' }}
      AUTO_POST: ${{ inputs.post_to_x == true && 'true' || 'false' }}
      HISTORY_PATH: post_history.json
      SIMILARITY_THRESHOLD: "0.82"
      LOG_LEVEL: INFO
      X_API_KEY: ${{ secrets.X_API_KEY }}
      X_API_SECRET: ${{ secrets.X_API_SECRET }}
      X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
      X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
      X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python files
        run: python -m py_compile main.py trigger_router.py post_generator.py scorer.py history_store.py prompts.py catalog.py x_client.py

      - name: Generate draft or post to X
        shell: bash
        run: |
          set -euo pipefail

          ARGS=(--trigger "${{ inputs.trigger }}")

          if [[ -n "${{ inputs.title }}" ]]; then
            ARGS+=(--title "${{ inputs.title }}")
          fi

          if [[ -n "${{ inputs.note }}" ]]; then
            ARGS+=(--note "${{ inputs.note }}")
          fi

          if [[ -n "${{ inputs.review_excerpt }}" ]]; then
            ARGS+=(--review-excerpt "${{ inputs.review_excerpt }}")
          fi

          if [[ "${{ inputs.persist_history }}" == "true" ]]; then
            ARGS+=(--persist)
          fi

          if [[ "${{ inputs.post_to_x }}" == "true" ]]; then
            ARGS+=(--post)
          fi

          python main.py "${ARGS[@]}" | tee draft_result.json

      - name: Upload draft result
        uses: actions/upload-artifact@v4
        with:
          name: aj-vale-x-draft
          path: |
            draft_result.json
            post_history.json
          if-no-files-found: ignore
